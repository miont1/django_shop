{% extends "base.html" %}
{% load static %}

{% block title %}Password Reset Complete | Hop & Barley{% endblock %}

{% block content %}
<!-- Main Content -->
<main class="auth-page-wrapper">
    <div class="auth-background">
        <img src="{% static 'img/background/pattern.jpg' %}" alt="Background pattern">
    </div>
    <div class="auth-form-container">
        <div class="auth-container auth-container--login" style="max-width: 450px; text-align: center;">
            <div class="Legend" style="margin-bottom: 25px;">
                <div style="font-size: 3rem; color: #319795; margin-bottom: 15px;">
                    <i class="fa-solid fa-circle-check"></i>
                </div>
                <h1 class="auth-title" style="font-size: 1.8rem; margin-bottom: 10px;">Password Reset!</h1>
                <p style="color: #a0aec0; font-size: 1rem;">Your password has been set. You may go ahead and log in now.</p>
            </div>

            <div class="ButtonGroup" style="margin-top: 25px;">
                <a href="{% url 'users:login' %}" class="button button--primary" style="width: 100%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-sizing: border-box; height: 38px;">Sign In</a>
            </div>
        </div>
    </div>
</main>
{% endblock %}
