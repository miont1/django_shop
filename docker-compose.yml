services:
  db:
    image: postgres:16-alpine
    container_name: django_postgres_db
    environment:
      POSTGRES_DB: my_shop_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_shop_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: django_shop_web
#    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      # Prevents local .venv or node_modules from overwriting container dependencies
      - /app/.venv
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-key-change-me-in-production
      - USE_POSTGRES=True
      - DB_NAME=my_shop_db
      - DB_USER=postgres
      - DB_PASSWORD=your_password
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
