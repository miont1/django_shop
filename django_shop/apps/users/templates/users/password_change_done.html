{% extends "base.html" %}
{% load static %}

{% block title %}Password Changed Successfully | Hop & Barley{% endblock %}

{% block content %}
<!-- Main Content -->
<main class="auth-page-wrapper">
    <div class="auth-background">
        <img src="{% static 'img/background/pattern.jpg' %}" alt="Background pattern">
    </div>
    <div class="auth-form-container">
        <div class="auth-container auth-container--login" style="max-width: 450px; text-align: center;">
            <div class="Legend" style="margin-bottom: 25px;">
                <div style="font-size: 3rem; color: #319795; margin-bottom: 15px;">
                    <i class="fa-solid fa-circle-check"></i>
                </div>
                <h1 class="auth-title" style="font-size: 1.8rem; margin-bottom: 10px;">Success!</h1>
                <p style="color: #a0aec0; font-size: 1rem;">Your password has been changed successfully.</p>
            </div>

            <div class="ButtonGroup" style="margin-top: 25px;">
                <a href="{% url 'users:profile' %}" class="button button--primary" style="width: 100%; display: block; text-align: center; text-decoration: none; line-height: 2.2;">Back to Profile</a>
            </div>
        </div>
    </div>
</main>
{% endblock %}
