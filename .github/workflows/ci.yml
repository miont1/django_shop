name: CI Workflow

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    name: Lint, Type Check & Run Unit Tests
    runs-on: ubuntu-latest

    env:
      DEBUG: 'True'
      SECRET_KEY: 'django-insecure-ci-test-key-do-not-use-in-production'
      USE_POSTGRES: 'False'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-django django-stubs djangorestframework-stubs
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Ruff Linter
        run: |
          cd django_shop
          ruff check .

      - name: Run Mypy Type Checker
        run: |
          cd django_shop
          mypy .

      - name: Run Pytest Test Suite
        run: |
          cd django_shop
          pytest
